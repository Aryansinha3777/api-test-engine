<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0d0d14"/>

  <!-- Outer ghost ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.15"/>

  <!-- Arc 1: top-right (cyan - request going out) -->
  <path d="M32,10 A22,22 0 0,1 54,32"
    fill="none" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arc 2: bottom (green - response coming back) -->
  <path d="M54,32 A22,22 0 0,1 10,32"
    fill="none" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arc 3: top-left (cyan faded - completing the cycle) -->
  <path d="M10,32 A22,22 0 0,1 32,10"
    fill="none" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Arrowhead on the green arc (response direction) -->
  <polygon points="12,25 10,33 18,30" fill="#00e676"/>

  <!-- Center bolt (send action) -->
  <polygon points="34,17 27,33 32,33 30,47 38,31 33,31" fill="url(#boltGrad)"/>
</svg>
